<!DOCTYPE html>
<html>
<head>
    <title>AI Startup Idea Generator</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="header">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="logo">
        <h1>AI Startup Idea Generator</h1>
    </div>

    <form method="POST">

        <input
            type="text"
            name="industry"
            placeholder="Enter Industry"
            required>

        <button type="submit">
            Generate Startup
        </button>

    </form>

    {% if startup %}

    <div class="result">

        <h2>🚀 Startup Details</h2>

        <p><strong>Name:</strong> {{ startup.name }}</p>

        <p><strong>Idea:</strong> {{ startup.idea }} for {{ startup.industry }}</p>

        <p><strong>Customers:</strong> {{ startup.customer }}</p>

        <p><strong>Revenue:</strong> {{ startup.revenue }}</p>

        <p><strong>Score:</strong> {{ startup.score }}/100</p>

    </div>

    {% endif %}

</div>

</body>
</html>
